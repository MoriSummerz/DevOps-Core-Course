---
# Docker role - Installation and configuration tasks
# Refactored with blocks for error handling and tags for selective execution

# Block 1: Docker Installation
- name: Install Docker Engine
  block:
    - name: Remove old Docker packages
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Install prerequisites for Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: no

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: "{{ docker_gpg_key_url }}"
        dest: "{{ docker_gpg_key_path }}"
        mode: '0644'

    - name: Add Docker repository
      apt_repository:
        repo: "{{ docker_apt_repository }}"
        state: present
        filename: docker
        update_cache: no

    - name: Update apt cache for Docker repo
      apt:
        update_cache: yes
        cache_valid_time: 0
      ignore_errors: yes

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: no
      notify: restart docker

  rescue:
    - name: Wait before retrying Docker installation
      pause:
        seconds: 10

    - name: Retry apt cache update after failure
      command: apt-get update --fix-missing
      changed_when: true

    - name: Retry Docker package installation
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes
      notify: restart docker

  always:
    - name: Ensure Docker service is enabled
      service:
        name: docker
        enabled: yes
        state: started
      ignore_errors: yes

    - name: Log Docker installation completion
      copy:
        content: "Docker installation block completed at {{ ansible_date_time.iso8601 }}\n"
        dest: /tmp/ansible_docker_install.log
        mode: '0644'

  become: true
  tags:
    - docker
    - docker_install

# Block 2: Docker Configuration
- name: Configure Docker
  block:
    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"

    - name: Install python3-docker for Ansible docker modules
      apt:
        name: python3-docker
        state: present

  become: true
  tags:
    - docker
    - docker_config

# Block 3: Docker Verification
- name: Verify Docker installation
  block:
    - name: Check Docker version
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      debug:
        var: docker_version.stdout

    - name: Check Docker Compose version
      command: docker compose version
      register: compose_version
      changed_when: false
      ignore_errors: yes

    - name: Display Docker Compose version
      debug:
        var: compose_version.stdout
      when: compose_version is success

  tags:
    - docker
    - docker_verify
