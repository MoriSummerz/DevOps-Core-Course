---
# Common role - System provisioning tasks
# Refactored with blocks for error handling and tags for selective execution

# Block 1: Package installation with error handling
- name: Install system packages
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: no

  rescue:
    - name: Fix apt cache on failure
      command: apt-get update --fix-missing
      changed_when: true

    - name: Retry installing common packages after fix
      apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: no

  always:
    - name: Log package installation completion
      copy:
        content: "Common role packages block completed at {{ ansible_date_time.iso8601 }}\n"
        dest: /tmp/ansible_common_packages.log
        mode: '0644'

  become: true
  tags:
    - common
    - packages

# Block 2: System configuration
- name: Configure system settings
  block:
    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

    - name: Ensure locale is set to en_US.UTF-8
      locale_gen:
        name: en_US.UTF-8
        state: present

  become: true
  tags:
    - common
    - system_config

# Block 3: User management
- name: Manage system users
  block:
    - name: Ensure admin group exists
      group:
        name: admin
        state: present

    - name: Create deploy user
      user:
        name: deploy
        groups: admin
        shell: /bin/bash
        create_home: yes
        state: present

  become: true
  tags:
    - common
    - users
