services:
  app:
    build: .
    image: morisummerz/devops-info-service:latest
    container_name: devops-info-service
    ports:
      - "8080:5000"
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      DEBUG: "false"
      VISITS_FILE: "/data/visits"
    volumes:
      - ./data:/data
    restart: unless-stopped
