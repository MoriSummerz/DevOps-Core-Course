# Demonstrates the wait-for-service init container pattern.
#
# Apply alongside the helm release `dev-devops-info-service` so that the
# init container has a real Service to resolve. To prove the gating works,
# you can also apply this manifest first (without the chart installed) —
# the pod will sit in Init:0/1 until the service appears.
apiVersion: v1
kind: Pod
metadata:
  name: wait-for-service-demo
  labels:
    app: wait-for-service-demo
    lab: lab16
spec:
  restartPolicy: Never
  initContainers:
    - name: wait-for-service
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eu
          # Use the FQDN: busybox's nslookup exits non-zero whenever ANY search
          # domain attempt fails, so the bare service name flaps even when DNS
          # works. Querying the fully-qualified name avoids the search list.
          ns="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
          target="${TARGET_SERVICE:-dev-devops-info-service}.${ns}.svc.cluster.local"
          echo "[init] waiting for ${target} to resolve"
          until nslookup "${target}" >/dev/null 2>&1; do
            echo "[init] $(date -u +%H:%M:%S) — ${target} not resolvable yet, sleeping 2s"
            sleep 2
          done
          echo "[init] ${target} resolved — starting main container"
      env:
        - name: TARGET_SERVICE
          value: dev-devops-info-service
  containers:
    - name: client
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          set -eu
          target="${TARGET_SERVICE:-dev-devops-info-service}"
          echo "[main] hitting http://${target}/health/ once per 5s"
          while true; do
            curl -sS "http://${target}/health/" || true
            echo
            sleep 5
          done
      env:
        - name: TARGET_SERVICE
          value: dev-devops-info-service
