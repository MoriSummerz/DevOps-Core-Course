apiVersion: v1
kind: Pod
metadata:
  name: init-download-demo
  labels:
    app: init-download-demo
    lab: lab16
spec:
  restartPolicy: Never
  initContainers:
    - name: init-download
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eu
          echo "[init] downloading example.com to /work-dir/index.html"
          wget -qO /work-dir/index.html https://example.com
          echo "[init] download complete: $(wc -c < /work-dir/index.html) bytes"
      volumeMounts:
        - name: workdir
          mountPath: /work-dir
  containers:
    - name: web
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: workdir
          mountPath: /usr/share/nginx/html
          readOnly: true
  volumes:
    - name: workdir
      emptyDir: {}
