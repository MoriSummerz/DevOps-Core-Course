apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/MoriSummerz/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-info-service
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    # No automated block → production requires manual sync.
    # Rationale: production deploys must be reviewed and timed; ArgoCD still
    # surfaces drift and out-of-sync status, but never auto-applies.
    syncOptions:
      - CreateNamespace=true
