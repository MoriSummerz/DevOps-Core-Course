# Replica count for the Deployment
# NOTE: When persistence is enabled with ReadWriteOnce PVC, keep replicaCount=1
# (multiple pods cannot share a RWO volume on most storage classes).
replicaCount: 1

# Container image configuration
image:
  repository: morisummerz/devops-info-service
  tag: "latest"
  pullPolicy: Never

# Override chart name or fullname
nameOverride: ""
fullnameOverride: ""

# Container port the application listens on
containerPort: 5000

# Service configuration
service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

# Rolling update strategy (used only when rollout.enabled=false → Deployment)
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# StatefulSet configuration (Lab 15). When enabled=true the chart renders
# a StatefulSet with per-pod PVCs (via volumeClaimTemplates) instead of
# a Deployment/Rollout sharing a single PVC. Stateful workloads get
# stable network identities, ordered scaling, and per-pod storage.
statefulset:
  enabled: false
  # OrderedReady (default): pods come up 0 → 1 → 2 sequentially.
  # Parallel: all pods come up at once (faster, no ordering guarantees).
  podManagementPolicy: OrderedReady
  updateStrategy:
    # RollingUpdate: pods updated highest-ordinal first, respecting partition.
    # OnDelete: pods only update when manually deleted.
    type: RollingUpdate
    # Pods with ordinal < partition are NOT updated. Use to canary the
    # highest-ordinal pods (e.g. partition=2 with 3 replicas updates only pod-2).
    partition: 0

# Argo Rollouts configuration. When enabled=true the chart renders a Rollout
# CRD instead of a Deployment, supporting canary or blueGreen strategies.
rollout:
  enabled: true
  # Strategy: "canary" | "blueGreen"
  strategy: canary

  # Canary strategy (Lab 14, Task 2):
  # 20% → manual pause → 40% → 30s → 60% → 30s → 80% → 30s → 100%
  canary:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 30s
      - setWeight: 80
      - pause:
          duration: 30s
      - setWeight: 100

  # Blue-Green strategy (Lab 14, Task 3): see values-bluegreen.yaml
  blueGreen:
    autoPromotionEnabled: false
    # autoPromotionSeconds: 30
    scaleDownDelaySeconds: 30
    previewService:
      type: ClusterIP
      # nodePort: 30081  # only when type=NodePort

  # Bonus: AnalysisTemplate driven web check on /health/.
  # Override via values-canary-analysis.yaml to add an `analysis` step
  # to canary.steps and flip enabled=true.
  analysis:
    enabled: false
    path: /health/
    jsonPath: "{$.status}"
    successCondition: 'result == "ok"'
    interval: 10s
    count: 3
    failureLimit: 1

# Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Liveness probe — restarts container if unhealthy
livenessProbe:
  httpGet:
    path: /health/
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Readiness probe — removes pod from service if not ready
readinessProbe:
  httpGet:
    path: /health/
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables passed to the container
env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"
  - name: DEBUG
    value: "false"
  - name: VISITS_FILE
    value: "/data/visits"

# Key-value pairs exposed to the container via a ConfigMap + envFrom
configMapEnv:
  APP_ENV: "dev"
  LOG_LEVEL: "INFO"
  CONFIG_FILE: "/config/config.json"

# ConfigMap file mount (config.json sourced from files/config.json)
configFile:
  enabled: true
  mountPath: /config

# Persistent volume for the visits counter
persistence:
  enabled: true
  mountPath: /data
  size: 100Mi
  accessMode: ReadWriteOnce
  # Use the default storage class when empty (Minikube provisions hostPath automatically)
  storageClass: ""

# Secret values (use placeholder defaults — override at deploy time)
secrets:
  DB_USERNAME: "changeme"
  DB_PASSWORD: "changeme"
  API_KEY: "changeme"

# Vault Agent Injector configuration
vault:
  enabled: false
  role: "devops-app"
  secretPath: "secret/data/devops/config"
  template: ""
  command: ""

# Service account configuration
serviceAccount:
  create: true
  name: ""

# Prometheus Operator integration (Lab 16 bonus). When enabled=true the chart
# renders a ServiceMonitor that tells Prometheus to scrape the app's /metrics
# endpoint via the existing Service. The `release: monitoring` label must
# match the kube-prometheus-stack release name so the operator picks it up.
monitoring:
  serviceMonitor:
    enabled: false
    # Label that ties the ServiceMonitor to a kube-prometheus-stack release.
    # Must equal the helm release name used to install the stack.
    releaseLabel: monitoring
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    # Empty → render in the chart's release namespace.
    namespace: ""

# Pod labels and annotations
podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
