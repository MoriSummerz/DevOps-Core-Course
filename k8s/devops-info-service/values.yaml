# Replica count for the Deployment
# NOTE: When persistence is enabled with ReadWriteOnce PVC, keep replicaCount=1
# (multiple pods cannot share a RWO volume on most storage classes).
replicaCount: 1

# Container image configuration
image:
  repository: morisummerz/devops-info-service
  tag: "latest"
  pullPolicy: Never

# Override chart name or fullname
nameOverride: ""
fullnameOverride: ""

# Container port the application listens on
containerPort: 5000

# Service configuration
service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

# Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Liveness probe — restarts container if unhealthy
livenessProbe:
  httpGet:
    path: /health/
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Readiness probe — removes pod from service if not ready
readinessProbe:
  httpGet:
    path: /health/
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables passed to the container
env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"
  - name: DEBUG
    value: "false"
  - name: VISITS_FILE
    value: "/data/visits"

# Key-value pairs exposed to the container via a ConfigMap + envFrom
configMapEnv:
  APP_ENV: "dev"
  LOG_LEVEL: "INFO"
  CONFIG_FILE: "/config/config.json"

# ConfigMap file mount (config.json sourced from files/config.json)
configFile:
  enabled: true
  mountPath: /config

# Persistent volume for the visits counter
persistence:
  enabled: true
  mountPath: /data
  size: 100Mi
  accessMode: ReadWriteOnce
  # Use the default storage class when empty (Minikube provisions hostPath automatically)
  storageClass: ""

# Secret values (use placeholder defaults — override at deploy time)
secrets:
  DB_USERNAME: "changeme"
  DB_PASSWORD: "changeme"
  API_KEY: "changeme"

# Vault Agent Injector configuration
vault:
  enabled: false
  role: "devops-app"
  secretPath: "secret/data/devops/config"
  template: ""
  command: ""

# Service account configuration
serviceAccount:
  create: true
  name: ""

# Pod labels and annotations
podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
