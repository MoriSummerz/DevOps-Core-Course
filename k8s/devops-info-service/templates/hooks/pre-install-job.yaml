apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-info-service.fullname" . }}-pre-install"
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      name: "{{ include "devops-info-service.fullname" . }}-pre-install"
      labels:
        {{- include "devops-info-service.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: pre-install-check
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "=== Pre-install validation started ==="
              echo "Release: {{ .Release.Name }}"
              echo "Chart: {{ .Chart.Name }}-{{ .Chart.Version }}"
              echo "App Version: {{ .Chart.AppVersion }}"
              echo "Namespace: {{ .Release.Namespace }}"
              echo "Validating environment configuration..."
              sleep 5
              echo "Pre-install validation completed successfully"
