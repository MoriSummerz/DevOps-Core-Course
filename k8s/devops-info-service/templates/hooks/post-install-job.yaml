apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-info-service.fullname" . }}-post-install"
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      name: "{{ include "devops-info-service.fullname" . }}-post-install"
      labels:
        {{- include "devops-info-service.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: post-install-smoke-test
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "=== Post-install smoke test started ==="
              echo "Waiting for service to be ready..."
              sleep 5
              echo "Testing health endpoint..."
              for i in 1 2 3; do
                if wget -q -O- http://{{ include "devops-info-service.fullname" . }}:{{ .Values.service.port }}/health/ 2>/dev/null; then
                  echo ""
                  echo "Health check passed on attempt $i"
                  break
                fi
                echo "Attempt $i failed, retrying in 5s..."
                sleep 5
              done
              echo "Post-install smoke test completed"
